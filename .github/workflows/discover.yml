name: discover-leads

# Hourly, on the hour (UTC). Refills the Brevo Queue with new IG leads.
# This is the only job that spends Apify credit — running it 24x/day burns
# far more Apify credit than the old Mon/Wed/Fri cadence (intentional).
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

concurrency:
  group: discover-leads
  cancel-in-progress: false

permissions:
  contents: write   # lets the job commit the updated dm_worklist.csv back

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python discover.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          BREVO_QUEUE_LIST_ID: ${{ secrets.BREVO_QUEUE_LIST_ID }}
          # Non-secret config — tweak here anytime:
          # Wide net (hourly cadence): 34 creator/parenting/montessori/screen-time/UGC
          # tags spanning distinct author pools. Creator/monetizer-dense tags expose
          # public bio emails most often; the broader mom-niche tags mostly feed the
          # manual DM worklist (no-email accounts) — both are wanted. The MX/syntax
          # filter still protects send reputation from bad addresses.
          HASHTAGS: momcontentcreator,momblogger,mominfluencer,momcreator,mompreneur,momboss,ugccreator,ugccommunity,parentingcoach,parentinginfluencer,gentleparenting,consciousparenting,respectfulparenting,positiveparenting,attachmentparenting,peacefulparenting,montessoriathome,montessorimom,montessoritoddler,playbasedlearning,screentime,screenfreekids,screenfreeplay,toddleractivities,toddlermom,toddlerlife,preschoolathome,earlychildhoodeducation,parentingtips,parentinghacks,raisingtoddlers,motherhoodunplugged,workingmom,newmom
          POSTS_PER_HASHTAG: '100'
          FOLLOWER_MIN: '1000'
          FOLLOWER_MAX: '1000000'
      - name: Commit updated DM worklist
        run: |
          git config user.name "lead-engine-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f dm_worklist.csv
          if git diff --cached --quiet; then
            echo "No new DM leads — nothing to commit."
          else
            git commit -m "Update DM worklist [skip ci]"
            git push
          fi
