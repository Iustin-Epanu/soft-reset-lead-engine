name: discover-leads

# Mon / Wed / Fri at 11:00 UTC. Refills the Brevo Queue with new IG leads.
# This is the only job that spends Apify credit — keep it to a few times/week.
on:
  schedule:
    - cron: '0 11 * * 1,3,5'
  workflow_dispatch: {}

concurrency:
  group: discover-leads
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python discover.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          BREVO_QUEUE_LIST_ID: ${{ secrets.BREVO_QUEUE_LIST_ID }}
          # Non-secret config — tweak here anytime:
          # Creator/monetizer-dense tags (bloggers, coaches, UGC, mompreneurs) expose
          # public bio emails far more often than broad personal tags (#momlife etc.),
          # which were 70% sub-1k personal accounts with no email.
          HASHTAGS: momcontentcreator,momblogger,parentingcoach,gentleparenting,consciousparenting,motherhoodunplugged,parentinginfluencer,mompreneur
          POSTS_PER_HASHTAG: '50'
          FOLLOWER_MIN: '5000'
          FOLLOWER_MAX: '250000'
